services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: seojing
      POSTGRES_PASSWORD: seojing
      POSTGRES_DB: seojing_backend
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seojing -d seojing_backend"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
